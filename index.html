<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Notes Dashboard</h1>
  <input type="text" id="searchInput" placeholder="Search notes or tags..." />
</header>

<div class="container">

  <div class="add-note">
    <input type="text" id="noteTitle" placeholder="Title"/>
    <textarea id="noteDesc" placeholder="Write your note..."></textarea>
    <input type="text" id="noteTags" placeholder="Tags (comma separated)"/>
    <button onclick="addNote()">Add Note</button>
  </div>

  <div id="notesGrid" class="grid"></div>

</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>Edit Note</h3>
    <input id="editTitle"/>
    <textarea id="editDesc"></textarea>
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
